          - generic [ref=e705]: "#define trigPin 12"
          - generic [ref=e627]: "#define echoPin 11"
          - generic [ref=e841]: "#define MAX_DISTANCE 200"
          - generic [ref=e843]: int ledPinR = 3;
          - generic [ref=e844]: int ledPinG = 5;
          - generic [ref=e845]: int ledPinB = 6;
          - generic [ref=e847]: float timeOut = MAX_DISTANCE * 60;
          - generic [ref=e848]: int soundVelocity = 340;
          - generic [ref=e850]: "void setup() {"
          - generic [ref=e851]: pinMode(trigPin, OUTPUT);
          - generic [ref=e852]: pinMode(echoPin, INPUT);
          - generic [ref=e853]: pinMode(ledPinR, OUTPUT);
          - generic [ref=e854]: pinMode(ledPinG, OUTPUT);
          - generic [ref=e855]: pinMode(ledPinB, OUTPUT);
          - generic [ref=e856]: Serial.begin(9600);
          - generic [ref=e857]: "}"
          - generic [ref=e859]: "void loop() {"
          - generic [ref=e860]: float distance = getSonar();
          - generic [ref=e861]: "Serial.print(\"Distance: \");"
          - generic [ref=e862]: Serial.print(distance);
          - generic [ref=e863]: Serial.println(" cm");
          - generic [ref=e865]: "if (distance < 30) {"
          - generic [ref=e866]: // Close - Red
          - generic [ref=e867]: setColor(0, 255, 255);
          - generic [ref=e868]: "} else if (distance < 100) {"
          - generic [ref=e869]: // Medium - Yellow
          - generic [ref=e870]: setColor(0, 0, 255);
          - generic [ref=e871]: "} else {"
          - generic [ref=e872]: // Far - Green
          - generic [ref=e873]: setColor(255, 0, 255);
          - generic [ref=e874]: "}"
          - generic [ref=e875]: delay(200);
          - generic [ref=e876]: "}"
          - generic [ref=e878]: "float getSonar() {"
          - generic [ref=e879]: unsigned long pingTime;
          - generic [ref=e880]: float distance;
          - generic [ref=e881]: digitalWrite(trigPin, HIGH);
          - generic [ref=e882]: delayMicroseconds(10);
          - generic [ref=e883]: digitalWrite(trigPin, LOW);
          - generic [ref=e884]: pingTime = pulseIn(echoPin, HIGH, timeOut);
          - generic [ref=e885]: distance = (float)pingTime * soundVelocity / 2 / 10000;
          - generic [ref=e886]: return distance;
          - generic [ref=e887]: "}"
