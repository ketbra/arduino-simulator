          - generic [ref=e159]: "#define trigPin 12"
          - generic [ref=e60]: "#define echoPin 11"
          - generic [ref=e618]: "#define MAX_DISTANCE 200"
          - generic [ref=e620]: int ledPinR = 3;
          - generic [ref=e621]: int ledPinG = 5;
          - generic [ref=e622]: int ledPinB = 6;
          - generic [ref=e624]: float timeOut = MAX_DISTANCE * 60;
          - generic [ref=e625]: int soundVelocity = 340;
          - generic [ref=e627]: "void setup() {"
          - generic [ref=e628]: pinMode(trigPin, OUTPUT);
          - generic [ref=e629]: pinMode(echoPin, INPUT);
          - generic [ref=e630]: pinMode(ledPinR, OUTPUT);
          - generic [ref=e631]: pinMode(ledPinG, OUTPUT);
          - generic [ref=e632]: pinMode(ledPinB, OUTPUT);
          - generic [ref=e633]: Serial.begin(9600);
          - generic [ref=e634]: "}"
          - generic [ref=e636]: "void loop() {"
          - generic [ref=e637]: float distance = getSonar();
          - generic [ref=e638]: "Serial.print(\"Distance: \");"
          - generic [ref=e639]: Serial.print(distance);
          - generic [ref=e640]: Serial.println(" cm");
          - generic [ref=e642]: "if (distance < 30) {"
          - generic [ref=e643]: // Close - Red
          - generic [ref=e644]: setColor(0, 255, 255);
          - generic [ref=e645]: "} else if (distance < 100) {"
          - generic [ref=e646]: // Medium - Yellow
          - generic [ref=e647]: setColor(0, 0, 255);
          - generic [ref=e648]: "} else {"
          - generic [ref=e649]: // Far - Green
          - generic [ref=e650]: setColor(255, 0, 255);
          - generic [ref=e651]: "}"
          - generic [ref=e652]: delay(200);
          - generic [ref=e653]: "}"
          - generic [ref=e655]: "float getSonar() {"
          - generic [ref=e656]: unsigned long pingTime;
          - generic [ref=e657]: float distance;
          - generic [ref=e658]: digitalWrite(trigPin, HIGH);
          - generic [ref=e659]: delayMicroseconds(10);
          - generic [ref=e660]: digitalWrite(trigPin, LOW);
          - generic [ref=e661]: pingTime = pulseIn(echoPin, HIGH, timeOut);
          - generic [ref=e662]: distance = (float)pingTime * soundVelocity / 2 / 10000;
          - generic [ref=e663]: return distance;
          - generic [ref=e664]: "}"
