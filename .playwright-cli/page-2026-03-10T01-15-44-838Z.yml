          - generic [ref=e818]: "}"
          - generic [ref=e819]: delay(200);
          - generic [ref=e820]: "}"
          - generic [ref=e822]: "float getSonar() {"
          - generic [ref=e823]: unsigned long pingTime;
          - generic [ref=e824]: float distance;
          - generic [ref=e825]: digitalWrite(trigPin, HIGH);
          - generic [ref=e826]: delayMicroseconds(10);
