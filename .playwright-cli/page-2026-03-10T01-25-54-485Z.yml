        - textbox [ref=e44]:
          - generic [ref=e587]: "#define trigPin 12"
          - generic [ref=e524]: "#define echoPin 11"
          - generic [ref=e725]: "#define MAX_DISTANCE 200"
          - generic [ref=e727]: int ledPinR = 3;
          - generic [ref=e728]: int ledPinG = 5;
          - generic [ref=e729]: int ledPinB = 6;
          - generic [ref=e731]: float timeOut = MAX_DISTANCE * 60;
          - generic [ref=e732]: int soundVelocity = 340;
          - generic [ref=e734]: "void setup() {"
          - generic [ref=e735]: pinMode(trigPin, OUTPUT);
          - generic [ref=e736]: pinMode(echoPin, INPUT);
          - generic [ref=e737]: pinMode(ledPinR, OUTPUT);
          - generic [ref=e738]: pinMode(ledPinG, OUTPUT);
          - generic [ref=e739]: pinMode(ledPinB, OUTPUT);
          - generic [ref=e740]: Serial.begin(9600);
          - generic [ref=e741]: "}"
          - generic [ref=e743]: "void loop() {"
          - generic [ref=e744]: float distance = getSonar();
          - generic [ref=e745]: "Serial.print(\"Distance: \");"
          - generic [ref=e746]: Serial.print(distance);
          - generic [ref=e747]: Serial.println(" cm");
          - generic [ref=e749]: "if (distance < 30) {"
          - generic [ref=e750]: // Close - Red
          - generic [ref=e751]: setColor(0, 255, 255);
          - generic [ref=e752]: "} else if (distance < 100) {"
          - generic [ref=e753]: // Medium - Yellow
          - generic [ref=e754]: setColor(0, 0, 255);
          - generic [ref=e755]: "} else {"
          - generic [ref=e756]: // Far - Green
          - generic [ref=e757]: setColor(255, 0, 255);
          - generic [ref=e758]: "}"
          - generic [ref=e759]: delay(200);
          - generic [ref=e760]: "}"
          - generic [ref=e762]: "float getSonar() {"
          - generic [ref=e763]: unsigned long pingTime;
          - generic [ref=e764]: float distance;
          - generic [ref=e765]: digitalWrite(trigPin, HIGH);
          - generic [ref=e766]: delayMicroseconds(10);
          - generic [ref=e767]: digitalWrite(trigPin, LOW);
          - generic [ref=e768]: pingTime = pulseIn(echoPin, HIGH, timeOut);
          - generic [ref=e769]: distance = (float)pingTime * soundVelocity / 2 / 10000;
          - generic [ref=e770]: return distance;
          - generic [ref=e771]: "}"
          - generic [ref=e773]: "void setColor(int red, int green, int blue) {"
          - generic [ref=e774]: analogWrite(ledPinR, red);
          - generic [ref=e775]: analogWrite(ledPinG, green);
          - generic [ref=e776]: analogWrite(ledPinB, blue);
          - generic [ref=e777]: "}"
